<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX2CZML example</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; }
      textarea { width: 100%; font-size: 10px; box-sizing: border-box; }
      h3 { margin-top: 2rem; }
    </style>
  </head>
  <body>
    <h2>GPX2CZML example</h2>

    <h3>1) From file input</h3>

    <button id="loadSample">Load sample gpx</button>

    <h3>czml output</h3>
    <textarea id="json" rows="25" readonly></textarea>

    <script type="module" src="./client.js"></script>
  </body>
